[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  port = 8888
  targetPort = 3000

# Redirect all API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Stripe webhook — must be exact path
[[redirects]]
  from = "/webhooks/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# SPA fallback for auth pages
[[redirects]]
  from = "/dashboard"
  to = "/showup-dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/showup-login.html"
  status = 200

[[redirects]]
  from = "/book/:slug"
  to = "/showup-booking.html"
  status = 200

[functions]
  node_bundler = "esbuild"
