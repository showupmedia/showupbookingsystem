<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Show Up</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--dark:#0a0a0a;--white:#fff;--blue:#2D8EFF;--blue-dim:rgba(45,142,255,0.12);--muted:#A0A0A0;--card:#161616;--card-border:rgba(255,255,255,0.09);--red:#FF4D4D;--green:#00C47A;--radius:6px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:20px 20px;}
.logo{font-family:'Fraunces',serif;font-weight:900;font-size:1.6rem;letter-spacing:-0.02em;margin-bottom:8px;position:relative;z-index:1;}
.logo .up{color:var(--blue);}
.tagline{font-size:0.8rem;color:var(--muted);margin-bottom:40px;position:relative;z-index:1;}
.box{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:36px 32px;width:100%;max-width:400px;position:relative;z-index:1;}
.box-title{font-family:'Fraunces',serif;font-weight:900;font-size:1.5rem;letter-spacing:-0.02em;margin-bottom:6px;}
.box-sub{font-size:0.84rem;color:var(--muted);margin-bottom:28px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:0.76rem;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:0.02em;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid var(--card-border);border-radius:var(--radius);padding:13px 15px;color:var(--white);font-family:'Cabinet Grotesk',sans-serif;font-size:0.92rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,142,255,0.1);}
.field input.error{border-color:var(--red);}
.btn{width:100%;background:var(--blue);color:#000;border:none;padding:14px;border-radius:var(--radius);font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:0.94rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{background:#1a7aee;transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.err-msg{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);border-radius:var(--radius);padding:10px 14px;font-size:0.82rem;color:var(--red);margin-bottom:16px;display:none;}
.err-msg.show{display:block;}
.success-msg{background:rgba(0,196,122,0.08);border:1px solid rgba(0,196,122,0.2);border-radius:var(--radius);padding:10px 14px;font-size:0.82rem;color:var(--green);margin-bottom:16px;display:none;}
.success-msg.show{display:block;}
.divider{text-align:center;color:var(--muted);font-size:0.78rem;margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--card-border);}
.divider::before{left:0;}.divider::after{right:0;}
.link-btn{width:100%;background:none;color:var(--muted);border:1px solid var(--card-border);padding:13px;border-radius:var(--radius);font-family:'Cabinet Grotesk',sans-serif;font-weight:600;font-size:0.88rem;cursor:pointer;transition:all .2s;margin-top:4px;}
.link-btn:hover{color:var(--white);border-color:rgba(255,255,255,0.25);}
.forgot{text-align:right;margin-top:6px;}
.forgot a{font-size:0.76rem;color:var(--muted);cursor:pointer;text-decoration:none;transition:color .2s;}
.forgot a:hover{color:var(--blue);}
.back-link{margin-top:24px;font-size:0.78rem;color:var(--muted);text-align:center;position:relative;z-index:1;}
.back-link a{color:var(--muted);text-decoration:none;transition:color .2s;}
.back-link a:hover{color:var(--white);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
</style>
</head>
<body>
<div class="logo">Show <span class="up">Up</span></div>
<div class="tagline">Business Dashboard Login</div>

<div class="box">
  <div class="box-title">Welcome back</div>
  <div class="box-sub">Sign in to manage your booking system</div>

  <div class="err-msg" id="errMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="hello@yourbusiness.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      <div class="forgot"><a onclick="showReset()">Forgot password?</a></div>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">
      <span id="loginBtnText">Sign In →</span>
      <div class="spinner" id="loginSpinner"></div>
    </button>
    <div class="divider">or</div>
    <button class="link-btn" onclick="showMagicLink()">✉️ Send magic link instead</button>
  </div>

  <!-- MAGIC LINK FORM -->
  <div id="magicForm" style="display:none;">
    <div class="field">
      <label>Your Email Address</label>
      <input type="email" id="magicEmail" placeholder="hello@yourbusiness.com">
    </div>
    <button class="btn" id="magicBtn" onclick="sendMagicLink()">
      <span id="magicBtnText">Send Magic Link →</span>
      <div class="spinner" id="magicSpinner"></div>
    </button>
    <div class="divider">or</div>
    <button class="link-btn" onclick="showLogin()">← Back to password login</button>
  </div>

  <!-- RESET FORM -->
  <div id="resetForm" style="display:none;">
    <p style="font-size:0.84rem;color:var(--muted);margin-bottom:18px;">Enter your email and we'll send a password reset link.</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="resetEmail" placeholder="hello@yourbusiness.com">
    </div>
    <button class="btn" onclick="sendReset()">Send Reset Link →</button>
    <div class="divider">or</div>
    <button class="link-btn" onclick="showLogin()">← Back to login</button>
  </div>
</div>

<div class="back-link"><a href="showup-landing.html">← Back to Show Up</a></div>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';       // Replace with your Supabase URL
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // Replace with your Supabase anon key

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Check if already logged in ──────────────────────────────
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'showup-dashboard.html';
});

// ── Helpers ─────────────────────────────────────────────────
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('errMsg').classList.remove('show');
}
function setLoading(btnId, spinnerId, txtId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
  document.getElementById(txtId).style.display = loading ? 'none' : 'inline';
}
function showLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('magicForm').style.display = 'none';
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('errMsg').classList.remove('show');
}
function showMagicLink() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('magicForm').style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
}
function showReset() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('magicForm').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';
}

// ── Email/password login ─────────────────────────────────────
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showErr('Please enter your email and password'); return; }
  setLoading('loginBtn','loginSpinner','loginBtnText', true);
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showErr(error.message === 'Invalid login credentials'
      ? 'Incorrect email or password. Try a magic link if you forgot your password.'
      : error.message);
    setLoading('loginBtn','loginSpinner','loginBtnText', false);
  } else {
    window.location.href = 'showup-dashboard.html';
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginForm').style.display !== 'none') login();
    else if (document.getElementById('magicForm').style.display !== 'none') sendMagicLink();
  }
});

// ── Magic link ───────────────────────────────────────────────
async function sendMagicLink() {
  const email = document.getElementById('magicEmail').value.trim();
  if (!email) { showErr('Please enter your email'); return; }
  setLoading('magicBtn','magicSpinner','magicBtnText', true);
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/showup-dashboard.html' }
  });
  setLoading('magicBtn','magicSpinner','magicBtnText', false);
  if (error) { showErr(error.message); }
  else { showSuccess('Magic link sent! Check your inbox and click the link to sign in.'); }
}

// ── Password reset ───────────────────────────────────────────
async function sendReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) { showErr('Please enter your email'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/showup-reset.html'
  });
  if (error) { showErr(error.message); }
  else { showSuccess('Reset link sent! Check your inbox.'); }
}
</script>
</body>
</html>
